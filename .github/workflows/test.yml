name: Tests

# Runs the TypeScript (Jest) + Kotlin (JUnit + Robolectric) test suites on
# every push and pull request. This complements the existing build-apk.yml
# workflow — that one only builds the APK; this one actually verifies the
# code does what it's supposed to do.
#
# The Jest suite covers all pure helpers, hooks, and presentational
# components (≈ 300+ tests). The JUnit + Robolectric suite covers the
# pure-JVM Kotlin helpers (TrackMath, GpxPoint, SegmentedBuffer, gap/pause
# state machine) and the GPX I/O + post-processors (which need Robolectric
# for android.util.Log + XmlPullParser).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # TypeScript / Jest
  # -----------------------------------------------------------------
  jest:
    name: Jest (TypeScript)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS deps
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run Jest
        run: npx jest --verbose --coverage --ci

      - name: Upload Jest coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  # -----------------------------------------------------------------
  # Kotlin / JUnit + Robolectric
  # -----------------------------------------------------------------
  kotlin:
    name: JUnit + Robolectric (Kotlin)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-license: true
          log-accepted-android-sdk-licenses: false

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Set up Node 22 (for the RN Gradle plugin's JS-bundling step)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS deps
        run: npm ci

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-test-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-test-${{ runner.os }}-

      - name: Generate debug keystore (Gradle needs it for BuildConfig)
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "✓ Generated debug.keystore"
          else
            echo "✓ debug.keystore already exists"
          fi

      - name: Run Kotlin unit tests (testDebugUnitTest)
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace --continue 2>&1 | tee test.log

      - name: Upload test log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-test-log
          path: android/test.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-test-results
          path: android/app/build/test-results/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test HTML report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-test-report
          path: android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 7
